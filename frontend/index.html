<!doctype html>
<html lang="en">
  <head>
    <script>
      window.global = window;
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- ✅ Title & Branding -->
    <title>VibeTalk – Connect. Chat. Vibe.</title>
    <meta
      name="description"
      content="VibeTalk – Real vibes, real conversations. Chat, call, and share with your friends instantly."
    />

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- ✅ Theme Color (updated by JS for light/dark) -->
    <meta name="theme-color" content="#0e1512" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ✅ Font - Outfit (modern, readable, engaging) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Open Graph -->
    <meta property="og:title" content="VibeTalk – Connect. Chat. Vibe." />
    <meta
      property="og:description"
      content="Join VibeTalk, a new way to chat and vibe with your friends in real time."
    />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vibetalk.app" />

    <!-- ✅ Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- ✅ LOTTIE SCRIPT (IMPORTANT) -->
    <script
      type="module"
      src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.8.11/dist/dotlottie-wc.js">
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
